name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Library AAR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # AGP 9.1.1 requires JDK 17+.
      # Temurin 17 is the OpenJDK distribution used by the Android team
      # in their own CI and is the recommended choice for FOSS projects.
      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Verify Java version
        run: java -version

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release AAR
        run: ./gradlew :library:assembleRelease --no-daemon --stacktrace

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v6
        with:
          name: freeDroidWarn-release-aar
          path: library/build/outputs/aar/*.aar
          retention-days: 14
          if-no-files-found: error
