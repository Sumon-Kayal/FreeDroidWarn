name: "CodeQL"

on:
  push:
  pull_request:
  schedule:
    - cron: '30 3 * * 1'   # weekly, Mon 03:30 UTC

jobs:
  analyze:
    name: Analyze (Java/Kotlin)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # v4.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@b36b23c9d30fb406e8989edf4799f9ef4f3ca449 # v4.0.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4fa2a795b3401d4b112187a41aa7e09b30cba22d # v3.25.11
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon -x test -x lint

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4fa2a795b3401d4b112187a41aa7e09b30cba22d # v3.25.11
        with:
          category: "/language:java-kotlin"
          
