plugins {
    id 'com.android.library'
}

android {
    namespace "org.woheller69.freeDroidWarn"
    compileSdk 35

    defaultConfig {
        minSdk 21
        // Removed targetSdk 35 as it is often redundant in library modules
        // but can be kept if specifically required by your project.
        versionCode 17
        versionName "1.7"
        consumerProguardFiles "proguard-rules.pro" // Important for libraries
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}